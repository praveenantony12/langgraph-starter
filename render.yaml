services:
  - type: web
    name: langgraph-starter
    runtime: python
    region: ohio
    plan: free

    # Install uv, then use it to install dependencies
    buildCommand: >-
      curl -LsSf https://astral.sh/uv/install.sh | sh &&
      export PATH="/opt/render/.local/bin:$PATH" &&
      uv sync

    # uv run resolves the venv automatically - no hardcoded path
    startCommand: uv run uvicorn api.server:app --host 0.0.0.0 --port $PORT

    pythonVersion: "3.11"
    autoDeploy: true
    branch: main

    # Render health check — pings this after deploy to confirm liveness
    healthCheckPath: /health

    envVars:
      - key: GROQ_API_KEY
        sync: false        # set this in Render dashboard → Environment
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: "1024"
      - key: TEMPERATURE
        value: "0.7"
      - key: MAX_ITERATIONS
        value: "5"
      - key: VERBOSE
        value: "false"
